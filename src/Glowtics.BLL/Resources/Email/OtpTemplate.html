<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Glowtics</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { background-color: #ffffff; padding: 30px 20px; text-align: center; border-bottom: 1px solid #eeeeee; }
        .header img { max-width: 150px; height: auto; }
        .content { padding: 40px 30px; text-align: center; color: #333333; }
        .content h2 { margin-top: 0; font-size: 24px; color: #1a1a1a; font-weight: 600; }
        .content p { font-size: 16px; line-height: 1.6; color: #555555; margin-bottom: 30px; }
        .otp-box { display: inline-block; padding: 14px 32px; background-color: #f8f9fa; color: #1a1a1a; border: 2px dashed #cccccc; border-radius: 6px; font-size: 28px; font-weight: bold; letter-spacing: 4px; }
        .footer { background-color: #fafafa; padding: 20px; text-align: center; font-size: 13px; color: #888888; border-top: 1px solid #eeeeee; }
    </style>
</head>
<body>
    <div class='container'>
        <div class='header'>
            <img src='https://i.postimg.cc/yYDwKkyy/glowtics-logo-rose-bg.png' alt='Glowtics Logo' />
        </div>
        <div class='content'>
            <h2>{{Title}}</h2>
            <p>{{Message}}</p>
            <div class='otp-box'>{{OtpCode}}</div>
            <p style='margin-top: 30px; font-size: 14px; color: #999999;'>{{FooterContext}}</p>
        </div>
        <div class='footer'>
            &copy; {{Year}} Glowtics. All rights reserved.
        </div>
    </div>
</body>
</html>
